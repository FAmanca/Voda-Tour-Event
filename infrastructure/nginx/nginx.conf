worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Backend / CMS Configuration (Directus)
    server {
        listen 80;
        server_name api.vodaevent.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Uncomment below to force HTTPS after generating SSL
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        location / {
            proxy_pass http://directus:8055;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Frontend Web App Configuration (Astro)
    server {
        listen 80;
        server_name vodaevent.id www.vodaevent.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Uncomment below to force HTTPS after generating SSL
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        location / {
            proxy_pass http://web:4321;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
