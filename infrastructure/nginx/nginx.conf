worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. Redirect HTTP to HTTPS (Port 80)
    server {
        listen 80;
        server_name vodatrip.id www.vodatrip.id api.vodatrip.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Backend CMS (Directus HTTPS - Port 443)
    server {
        listen 443 ssl;
        server_name api.vodatrip.id;

        ssl_certificate /etc/letsencrypt/live/vodatrip.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vodatrip.id/privkey.pem;

        location / {
            proxy_pass http://directus:8055;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. Astro Frontend (HTTPS - Port 443)
    server {
        listen 443 ssl;
        server_name vodatrip.id www.vodatrip.id;

        ssl_certificate /etc/letsencrypt/live/vodatrip.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vodatrip.id/privkey.pem;

        location / {
            proxy_pass http://web:4321;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
