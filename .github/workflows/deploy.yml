# =============================================================================
# Deploy — Pull, Build, and Deploy to Shared VPS (triggered by CI success)
# =============================================================================
# Runs ONLY after CI passes on main/release branches, via workflow_run trigger.
#
# Prerequisites (set in GitHub → Settings → Secrets and variables → Actions):
#   VPS_HOST       — VPS IP address or domain
#   VPS_USER       — SSH username (e.g., deploy)
#   VPS_SSH_KEY    — SSH private key (deploy key with repo read access)
#   VPS_PATH       — Path to project on VPS (e.g., /home/deploy/voda-tour-event)
#
# Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   VPS_ENABLED    — Set to 'true' to enable auto-deploy
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    # Manual trigger from GitHub UI
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          EOF

      - name: Execute Deploy on VPS
        run: |
          set -euo pipefail

          # Get target branch
          TARGET_BRANCH="${{ github.event.inputs.branch || github.event.workflow_run.head_branch || 'main' }}"
          echo "Deploying branch: $TARGET_BRANCH"

          # Write deploy script to temp file to avoid heredoc escaping issues
          cat > /tmp/deploy-vps.sh << EOF
          set -euo pipefail
          cd ${{ secrets.VPS_PATH }}

          # Sync repository code
          echo "Syncing latest code from GitHub..."
          git fetch origin
          git checkout $TARGET_BRANCH
          git reset --hard origin/$TARGET_BRANCH
          git clean -fd -e infrastructure/.env.prod

          export COMPOSE_ENV_FILE="--env-file infrastructure/.env.prod"

          echo "Starting Postgres Database..."
          docker compose -f docker-compose.prod.yml \$COMPOSE_ENV_FILE up -d postgres

          echo "Waiting for database to be healthy..."
          DB_READY=false
          for i in \$(seq 1 20); do
            HEALTH=\$(docker inspect --format='{{.State.Health.Status}}' voda-postgres-prod 2>/dev/null || echo "missing")
            STATUS=\$(docker inspect --format='{{.State.Status}}' voda-postgres-prod 2>/dev/null || echo "missing")
            if [ "\$HEALTH" = "healthy" ]; then
              echo "Database is healthy!"
              DB_READY=true
              break
            fi
            echo "   Postgres Status: \$STATUS / Health: \$HEALTH"
            sleep 3
          done

          if [ "\$DB_READY" = false ]; then
            echo "❌ Postgres failed to start in time. Aborting deployment."
            exit 1
          fi

          echo "Building and launching all Docker services..."
          # Deploy all services including nginx and certbot for a standalone Docker-only VPS setup
          docker compose -f docker-compose.prod.yml \$COMPOSE_ENV_FILE up -d --build

          # ── Health check ──────────────────────────────────────────
          echo "Checking application health via Nginx..."
          DEPLOY_SUCCESS=false
          for i in \$(seq 1 15); do
            # Check Astro Web and Directus through Nginx on port 80 using Host headers
            WEB_STATUS=\$(curl -o /dev/null -s -w "%{http_code}" -H "Host: vodatrip.id" http://localhost || echo "failed")
            CMS_STATUS=\$(curl -o /dev/null -s -w "%{http_code}" -H "Host: api.vodatrip.id" http://localhost/server/ping || echo "failed")
            
            echo "   Web status: \$WEB_STATUS | CMS status: \$CMS_STATUS"
            
            if [ "\$WEB_STATUS" = "200" ] && [ "\$CMS_STATUS" = "200" ]; then
              DEPLOY_SUCCESS=true
              break
            fi
            sleep 3
          done

          if [ "\$DEPLOY_SUCCESS" = true ]; then
            echo "✅ Deployment successful! Both Astro and Directus are healthy."
          else
            echo "❌ Deployment health check FAILED."
            echo "=== WEB CONTAINER LOGS ==="
            docker logs voda-web-prod --tail 30 2>/dev/null || echo "(no logs)"
            echo "=== DIRECTUS CONTAINER LOGS ==="
            docker logs voda-directus-prod --tail 30 2>/dev/null || echo "(no logs)"
            exit 1
          fi

          # ── Cleanup ────────────────────────────────────────────────
          echo "Pruning old unused Docker images..."
          docker image prune -f --filter "until=24h"
          EOF

          # Copy and execute the script on VPS
          scp /tmp/deploy-vps.sh vps:/tmp/deploy-vps.sh
          ssh vps "bash /tmp/deploy-vps.sh"

          # Cleanup temp files
          rm -f /tmp/deploy-vps.sh
          ssh vps "rm -f /tmp/deploy-vps.sh" || true

      - name: Verify deployment from external
        run: |
          sleep 10
          echo "→ Checking external Web URL..."
          curl -sSf -H "Host: vodatrip.id" "http://${{ secrets.VPS_HOST }}/" -o /dev/null -w "   HTTP %{http_code}\n" || \
            echo "⚠ External Web check failed (port might be blocked by firewall or loading)"

          echo "→ Checking external Directus URL..."
          curl -sSf -H "Host: api.vodatrip.id" "http://${{ secrets.VPS_HOST }}/server/ping" -o /dev/null -w "   HTTP %{http_code}\n" || \
            echo "⚠ External Directus check failed"
